version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: truedoc_user
      POSTGRES_PASSWORD: truedoc_password
      POSTGRES_DB: truedoc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: 
      context: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://truedoc_user:truedoc_password@db:5432/truedoc_db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=1
    depends_on:
      - db
      - redis

  celery:
    build:
      context: ./backend
    command: celery -A truedoc_core worker -l INFO
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://truedoc_user:truedoc_password@db:5432/truedoc_db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=1
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
    command: npm start
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
    stdin_open: true
    tty: true

volumes:
  postgres_data:
